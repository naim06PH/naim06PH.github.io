# Deploys the Next.js static export in ./naim-portfolio to GitHub Pages.
# IMPORTANT: in repo Settings → Pages, set "Source" to "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./naim-portfolio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: naim-portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js static export)
        run: npm run build

      # Ensure GitHub Pages doesn't try to run Jekyll on the output
      # (Jekyll ignores files/folders starting with "_", which Next.js uses).
      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./naim-portfolio/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
